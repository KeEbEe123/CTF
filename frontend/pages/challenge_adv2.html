<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protocol Collapse — Advanced Track | ZeroTrace CTF</title>
  <meta name="description" content="Advanced CTF: Protocol Collapse. Analyze and exploit an undocumented custom protocol state machine." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/shared.css" />
  <style>
    .adv-shell { background:#060d1a; max-width:960px; margin:0 auto; padding:0 1.5rem 4rem; }
    .phantom-story { background:rgba(6,182,212,0.04); border:1px solid rgba(6,182,212,0.2); border-left:3px solid #06b6d4; border-radius:8px; padding:1rem 1.25rem; color:#67e8f9; font-style:italic; font-size:0.875rem; margin-bottom:1.5rem; line-height:1.7; }
    .adv-panel { background:#0d1b2e; border:1px solid rgba(6,182,212,0.15); border-radius:12px; padding:1.5rem; margin-bottom:1.25rem; }
    .adv-panel h2 { font-family:'Orbitron',monospace; font-size:0.95rem; color:#e2e8f0; margin:0 0 1rem; padding-bottom:0.625rem; border-bottom:1px solid rgba(6,182,212,0.1); display:flex; align-items:center; gap:0.5rem; }
    .adv-badge-row { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; margin-bottom:0.75rem; }
    .adv-badge { display:inline-block; font-size:0.65rem; font-weight:700; padding:0.2rem 0.625rem; border-radius:999px; text-transform:uppercase; letter-spacing:.05em; }
    .badge-track { background:rgba(6,182,212,0.12); border:1px solid rgba(6,182,212,0.3); color:#06b6d4; }
    .badge-expert { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:#ef4444; }
    .badge-pts { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.25); color:#10b981; }
    .badge-type { background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2); color:#f59e0b; }
    .no-hints-notice { display:inline-flex; align-items:center; gap:0.25rem; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); color:#ef4444; font-size:0.7rem; font-weight:700; padding:0.25rem 0.625rem; border-radius:999px; }
    .console-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:700px){.console-grid{grid-template-columns:1fr;}}
    .c-terminal { background:#020a14; border:1px solid rgba(6,182,212,0.15); border-radius:8px; padding:0.875rem; font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:#06b6d4; min-height:200px; max-height:320px; overflow-y:auto; line-height:1.5; white-space:pre-wrap; word-break:break-all; }
    .c-history { background:#020a14; border:1px solid rgba(6,182,212,0.15); border-radius:8px; padding:0.875rem; font-family:'JetBrains Mono',monospace; font-size:0.76rem; color:#94a3b8; min-height:200px; max-height:320px; overflow-y:auto; line-height:1.5; }
    .c-input-area { display:flex; gap:0.5rem; margin-top:0.5rem; }
    .c-input { background:rgba(255,255,255,0.04); border:1px solid rgba(6,182,212,0.2); border-radius:6px; padding:0.5rem 0.75rem; color:#e2e8f0; font-family:'JetBrains Mono',monospace; font-size:0.82rem; outline:none; flex:1; transition:all .2s; }
    .c-input:focus { border-color:rgba(6,182,212,0.5); background:rgba(6,182,212,0.03); }
    .c-input:disabled { opacity:0.45; cursor:not-allowed; }
    .c-btn { background:rgba(6,182,212,0.12); border:1px solid rgba(6,182,212,0.3); color:#06b6d4; font-weight:700; font-size:0.82rem; padding:0.5rem 1rem; border-radius:6px; cursor:pointer; font-family:'JetBrains Mono',monospace; transition:all .2s; white-space:nowrap; }
    .c-btn:hover { background:rgba(6,182,212,0.2); }
    .c-btn:disabled { opacity:0.45; cursor:not-allowed; }
    .conn-row { display:flex; gap:0.75rem; align-items:center; margin-bottom:0.875rem; flex-wrap:wrap; }
    #connectionState { font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:#64748b; }
  </style>
</head>

<body class="challenge-page">

  <nav class="zt-nav">
    <div class="zt-nav-inner">
      <a class="zt-nav-brand" href="/">
        <span class="zt-nav-mark">ZT</span>
        <span class="zt-nav-title">ZeroTrace <span class="zt-nav-accent">CTF</span></span>
      </a>
      <div class="zt-nav-actions">
        <span id="userIdentity" class="zt-nav-user"></span>
        <a href="/" class="zt-nav-link">← Dashboard</a>
      </div>
    </div>
  </nav>

  <div class="adv-shell">

    <div style="padding:2rem 0 1rem;">
      <div class="adv-badge-row">
        <span class="adv-badge badge-track">🌐 Advanced Track</span>
        <span class="adv-badge badge-expert">Expert</span>
        <span class="adv-badge badge-type">Offensive</span>
        <span class="adv-badge badge-pts" id="pointsBadge">-- pts</span>
        <span class="no-hints-notice">🚫 No hints</span>
      </div>
      <h1 style="font-family:'Orbitron',monospace;font-size:2rem;color:#fff;margin:0 0 0.5rem;" id="challengeTitle">Protocol Collapse</h1>
      <p style="color:#94a3b8;font-size:0.9rem;line-height:1.7;margin:0;" id="challengeDescription">Loading...</p>
    </div>

    <blockquote class="phantom-story" id="challengeStory">Loading...</blockquote>

    <!-- RAW SOCKET INTERFACE -->
    <div class="adv-panel">
      <h2>📡 Raw Socket Interface</h2>
      <div class="conn-row">
        <button id="connectBtn" class="c-btn">Initialize Connection Session</button>
        <button id="resetBtn" class="c-btn" style="display:none;background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.2);color:#ef4444;">Reset TCP State</button>
        <span id="connectionState">Status: Disconnected</span>
      </div>
      <div class="console-grid">
        <div>
          <div id="terminal" class="c-terminal" style="opacity:0.5;pointer-events:none;">// Connect to begin TCP stream analysis.</div>
          <div class="c-input-area">
            <input type="text" id="payloadInput" class="c-input" placeholder="e.g. 5:HELO:0000:hello:42" disabled />
            <button id="sendBtn" class="c-btn" disabled>TX</button>
          </div>
        </div>
        <div id="history" class="c-history">
          <div style="text-align:center;margin-top:1rem;color:#475569;">No RX/TX history yet</div>
        </div>
      </div>
    </div>

    <!-- FLAG SUBMIT -->
    <div class="adv-panel">
      <h2>🚩 Submit Extracted Payload</h2>
      <form style="display:flex;gap:0.6rem;" id="flagForm" autocomplete="off">
        <input type="text" id="flagInput" class="flag-input" placeholder="CTF{...}" spellcheck="false" style="flex:1;" />
        <button type="submit" class="flag-submit-btn" id="flagSubmitBtn">SUBMIT</button>
      </form>
      <div id="flagResult" class="result-text" style="margin-top:0.75rem;"></div>
    </div>

  </div>
  <script src="../js/challenge_adv2.js"></script>
</body>
</html>
