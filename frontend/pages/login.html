<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | ZeroTrace CTF</title>
  <meta name="description" content="Sign in to your ZeroTrace CTF account and continue your cybersecurity training." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="/css/shared.css" />
  <link rel="icon" href="/images/favicon.png">
</head>

<body class="login-page">
  <div class="auth-shell">

    <!-- NAV -->
    <nav class="zt-nav">
      <div class="zt-nav-inner">
        <a class="zt-nav-brand" href="/">
          <span class="zt-nav-mark">ZT</span>
          <span class="zt-nav-title">ZeroTrace <span class="zt-nav-accent">CTF</span></span>
        </a>
        <div class="zt-nav-actions">
          <a class="zt-nav-link" href="/pages/register.html">Register →</a>
        </div>
      </div>
    </nav>

    <!-- AUTH MAIN -->
    <div class="auth-main">
      <div class="auth-card">
        <span class="auth-badge">🔐 Secure Access</span>
        <h1 class="auth-title">Welcome Back</h1>
        <p id="loginMessage" class="error-message"></p>
        <p class="auth-subtitle">Login to continue your training.</p>

        <form id="loginForm">
          <div class="auth-field">
            <label class="auth-label" for="email">Email</label>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                <rect x="2.25" y="6.75" width="19.5" height="10.5" rx="1.5" />
                <path d="m3 8 8.02 5.35a1.8 1.8 0 0 0 1.96 0L21 8" stroke-linecap="round"/>
              </svg>
              <input id="email" class="auth-input login-input" type="email" placeholder="you@example.com" autocomplete="username" required />
            </div>
          </div>

          <div class="auth-field">
            <label class="auth-label" for="password">Password</label>
            <div class="auth-input-wrap">
              <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                <rect x="5" y="10.5" width="14" height="9.5" rx="1.75" />
                <path d="M8.5 10.5V8.25a3.5 3.5 0 1 1 7 0v2.25" stroke-linecap="round"/>
              </svg>
              <input id="password" class="auth-input login-input" type="password" placeholder="••••••••" autocomplete="current-password" required />
            </div>
          </div>

          <div class="remember-wrap" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.25rem;">
            <label style="display:flex;align-items:center;gap:0.375rem;font-size:0.78rem;color:#64748b;cursor:pointer;">
              <input id="rememberMe" type="checkbox" checked disabled style="accent-color:#10b981;margin:0;" />
              Remember me
            </label>
            <a href="#" id="forgotBtn" class="forgot-link" style="color:#64748b;font-size:0.75rem;text-decoration:none;transition:color 0.2s;">Forgot password?</a>
          </div>

<button class="auth-submit login-submit" type="submit">LOGIN</button>
        </form>

        <p class="auth-footer-link">Don't have an account? <a href="/pages/register.html">Register</a></p>
      </div>
    </div>

    <!-- STATS BAR -->
    <div style="background:#0d1b2e;border-top:1px solid rgba(16,185,129,0.1);padding:1.25rem 1.5rem;">
      <div style="max-width:700px;margin:0 auto;display:flex;justify-content:space-around;flex-wrap:wrap;gap:1rem;text-align:center;">
        <div><div style="font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;color:#10b981;">8</div><div style="font-size:0.7rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;">Total Challenges</div></div>
        <div><div style="font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;color:#10b981;">2400</div><div style="font-size:0.7rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;">Max Points</div></div>
        <div><div style="font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;color:#10b981;">4hr</div><div style="font-size:0.7rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;">Adv. Track Time</div></div>
        <div><div style="font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;color:#10b981;">24/7</div><div style="font-size:0.7rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;">Live Labs</div></div>
      </div>
    </div>

  </div>
  <script src="../js/login.js"></script>
</body>
</html>
